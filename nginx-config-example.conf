# Nginx Configuration Example for FlowBot
# Copy this to: /etc/nginx/sites-available/flowbot

server {
    listen 80;
    server_name your-domain.com;  # שנה לדומיין שלך או IP

    # הגבלת גודל העלאה (50MB לתמונות)
    client_max_body_size 50M;

    # Frontend - React Application
    location / {
        root /var/www/project-bots/frontend/dist;  # שנה את הנתיב אם שונה
        try_files $uri $uri/ /index.html;
        
        # Cache static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # תמונות מועלות - שרת סטטי (מהיר!)
    # כל התמונות שהמשתמשים מעלים נשמרות פה
    location /uploads {
        alias /var/www/project-bots/backend/uploads;  # שנה את הנתיב אם שונה
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;  # לא נרשום לוג על תמונות (חוסך משאבים)
        
        # אפשר CORS לתמונות
        add_header Access-Control-Allow-Origin *;
    }

    # Backend API - Node.js/Express
    # כל הקריאות ל-API עוברות פה
    location /api {
        proxy_pass http://localhost:3001;  # שנה את הפורט אם צריך
        proxy_http_version 1.1;
        
        # Headers חשובים
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # אפשר כל ה-HTTP methods (GET, POST, PUT, DELETE, OPTIONS)
        proxy_method $request_method;
        
        # הגדרות timeout (מניעת disconnects)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Logs
    access_log /var/log/nginx/flowbot-access.log;
    error_log /var/log/nginx/flowbot-error.log;
}

